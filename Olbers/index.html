<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olbers' Paradox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .title {
    color: #c8b89a;
    font-size: 26px;
    font-weight: normal;
    letter-spacing: .18em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #555;
    font-size: 13px;
    letter-spacing: .1em;
    font-style: italic;
    margin-bottom: 48px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
    max-width: 380px;
  }

  .btn {
    display: block;
    text-align: center;
    text-decoration: none;
    border: 1px solid #c8b89a;
    color: #c8b89a;
    background: transparent;
    font-family: Georgia, serif;
    font-size: 14px;
    letter-spacing: .18em;
    text-transform: uppercase;
    padding: 18px 28px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s, color 0.3s;
  }
  .btn:hover,
  .btn:active,
  .btn:focus-visible {
    background: #c8b89a;
    color: #0a0a0a;
    outline: none;
  }

  footer {
    color: #6b6253;
    font-size: 11px;
    letter-spacing: .08em;
    font-style: italic;
    text-align: center;
    margin-top: 64px;
  }
</style>
</head>
<body>
  <h1 class="title">Olbers&rsquo; Paradox</h1>
  <p class="subtitle">Choose what to view</p>

  <nav class="choices">
    <a class="btn" href="https://drive.google.com/file/d/1IQTvXoo_rOdPgJQ5rqv-B4oho5Qb22o3/view?usp=sharing">Go to Olbers Video</a>
    <a class="btn" href="https://bobarebob.github.io/Slide-Quizzes/CosmicRedshift/index.html">Go to Cosmic Redshift Animation</a>
  </nav>

  <footer>&copy; 2026 Magellica Press / R. Mahoney. All rights reserved.</footer>
</body>
</html>
