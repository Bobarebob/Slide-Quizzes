<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twilight Duration Animation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap');
:root{--bg:#060612;--panel:rgba(13,13,36,0.92);--border:#1a1a3a;--accent:#ff8c42;--accent2:#e84393;--text:#c8c8e0;--text-dim:#6868a0;--civil:#ff6b35;--nautical:#3a86ff;--astro:#8338ec;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito','Segoe UI',sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--text);overflow-x:hidden;}
#app{max-width:1600px;margin:0 auto;padding:8px 10px;}
header{font-family:'Orbitron','Courier New',monospace;font-size:1.3rem;font-weight:700;text-align:center;padding:5px 0 3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
header small{display:block;font-family:'Nunito','Segoe UI',sans-serif;font-size:.55rem;letter-spacing:4px;-webkit-text-fill-color:var(--text-dim);margin-top:1px;}
#controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;background:rgba(13,13,36,.95);border:1px solid var(--border);border-radius:8px;padding:6px 10px;margin:5px 0;}
.ctrl-group{display:flex;flex-direction:column;gap:1px;}
.ctrl-group label{font-size:.55rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);font-weight:600;font-family:'Nunito','Segoe UI',sans-serif;}
select,button{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:'Nunito','Segoe UI',sans-serif;font-size:.75rem;cursor:pointer;transition:border-color .2s;}
select:hover,button:hover{border-color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:120px;height:4px;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);}
.lat-display{font-family:'Orbitron','Courier New',monospace;font-size:.75rem;color:var(--accent);min-width:34px;text-align:center;}
#info-box{font-size:.58rem;color:var(--text-dim);line-height:1.3;white-space:pre-line;max-width:170px;padding:2px 6px;border-right:1px solid var(--border);}
#info-box b{color:var(--text);}
#canvas-wrap{position:relative;width:100%;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#000;}
#sky-canvas{width:100%;display:block;}
#phase-label{position:absolute;top:8px;left:10px;font-family:'Orbitron','Courier New',monospace;font-size:.68rem;letter-spacing:1px;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.65);border:1px solid var(--border);}
#alt-label{position:absolute;top:8px;left:215px;font-family:'Orbitron','Courier New',monospace;font-size:.62rem;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.65);border:1px solid var(--border);color:var(--accent);}
#float-panels{position:absolute;top:8px;right:8px;width:235px;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
#float-panels>*{pointer-events:auto;}
.fcard{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px;transition:opacity .35s ease;}
.fcard h3{font-family:'Orbitron','Courier New',monospace;font-size:.52rem;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;}
#elapsed-clock{font-family:'Orbitron','Courier New',monospace;font-size:1.4rem;font-weight:700;text-align:center;color:var(--accent);margin:2px 0 5px;text-shadow:0 0 16px rgba(255,140,66,.3);}
.segment-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.segment-row:last-child{border-bottom:none;}
.seg-label{font-size:.62rem;display:flex;align-items:center;gap:4px;}
.seg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.seg-time{font-family:'Orbitron','Courier New',monospace;font-size:.66rem;font-weight:600;color:var(--text-dim);}
.seg-time.filled{color:#fff;}
#azimuth-canvas{width:100%;display:block;border-radius:4px;}
#az-info{font-size:.6rem;color:var(--text-dim);margin-top:3px;line-height:1.35;}
.btn-row{display:flex;gap:4px;}
.btn-row button{flex:1;font-size:.73rem;}
#btn-fs{font-size:.65rem;padding:2px 5px;cursor:pointer;}
@media(max-width:700px){#float-panels{position:static;width:100%;flex-direction:row;flex-wrap:wrap;margin-top:6px;}.fcard{flex:1;min-width:200px;}}
</style>
</head>
<body>
<div id="app">
<header>Twilight Duration<small>Evening Twilight · Equinoxes &amp; Solstices · Northern Hemisphere</small></header>
<div id="controls">
  <div class="ctrl-group"><label>&nbsp;</label><button id="btn-fs" title="Toggle Fullscreen">⛶ Full</button></div>
  <div id="info-box"></div>
  <div class="ctrl-group"><label>Year</label><select id="sel-year"></select></div>
  <div class="ctrl-group"><label>Day</label>
    <select id="sel-day"><option value="vernal">Vernal Equinox</option><option value="summer">Summer Solstice</option><option value="autumnal">Autumnal Equinox</option><option value="winter">Winter Solstice</option></select>
  </div>
  <div class="ctrl-group"><label>Latitude</label>
    <div style="display:flex;align-items:center;gap:5px;"><input type="range" id="sl-lat" min="0" max="70" value="35" step="1"><span class="lat-display" id="lat-display">35°N</span></div>
  </div>
  <div class="ctrl-group"><label>Speed</label>
    <select id="sel-speed"><option value="30">30×</option><option value="60">60×</option><option value="120">120×</option><option value="240">240×</option><option value="480" selected>480×</option></select>
  </div>
  <div class="ctrl-group"><label>&nbsp;</label>
    <div class="btn-row"><button id="btn-play">▶ Play</button><button id="btn-restart">⟳ Reset</button></div>
  </div>
  <div class="ctrl-group"><label>Location</label><select id="loc-sel"></select></div>
  <div class="ctrl-group"><label>Viewpoint</label><select id="vp-sel"><option value="W" selected>W</option><option value="NW">NW</option><option value="SW">SW</option></select></div>
</div>
<div id="canvas-wrap">
  <canvas id="sky-canvas"></canvas>
  <div id="phase-label">DAYLIGHT</div>
  <div id="alt-label">+6.0°</div>
  <div id="float-panels">
    <div class="fcard" id="card-timer">
      <h3 id="timer-title">Elapsed Time Since Sunset</h3>
      <div id="elapsed-clock">00:00</div>
      <div class="segment-row"><span class="seg-label"><span class="seg-dot" style="background:var(--civil)"></span>Civil (0°→−6°)</span><span class="seg-time" id="t-civil">──:──</span></div>
      <div class="segment-row"><span class="seg-label"><span class="seg-dot" style="background:var(--nautical)"></span>Nautical (−6°→−12°)</span><span class="seg-time" id="t-nautical">──:──</span></div>
      <div class="segment-row"><span class="seg-label"><span class="seg-dot" style="background:var(--astro)"></span>Astro (−12°→−18°)</span><span class="seg-time" id="t-astro">──:──</span></div>
      <div class="segment-row" style="border-top:1px solid var(--border);margin-top:2px;padding-top:4px;"><span class="seg-label" style="font-weight:700;">Total (0°→−18°)</span><span class="seg-time" id="t-total" style="color:var(--accent);">──:──</span></div>
    </div>
    <div class="fcard" id="card-azimuth">
      <h3>Sunset Azimuth Diagram</h3>
      <canvas id="azimuth-canvas" width="215" height="165"></canvas>
      <div id="az-info"></div>
    </div>
  </div>
</div>
</div>

<script>
const D=Math.PI/180,RD=180/Math.PI;
const DECL={vernal:0,summer:23.44,autumnal:0,winter:-23.44};
const DOY={vernal:79,summer:172,autumnal:266,winter:355};
const DL={vernal:'Vernal Equinox',summer:'Summer Solstice',autumnal:'Autumnal Equinox',winter:'Winter Solstice'};
const DSH={vernal:'VE',summer:'SS',autumnal:'AE',winter:'WS'};
const DI={vernal:0,summer:1,autumnal:2,winter:3};
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const EU={
  2026:{vernal:[2,20,14,46],summer:[5,21,8,25],autumnal:[8,23,0,6],winter:[11,21,20,50]},
  2027:{vernal:[2,20,20,25],summer:[5,21,14,11],autumnal:[8,23,6,2],winter:[11,22,2,43]},
  2028:{vernal:[2,20,2,17],summer:[5,20,20,2],autumnal:[8,22,11,45],winter:[11,21,8,20]},
  2029:{vernal:[2,20,8,1],summer:[5,21,1,48],autumnal:[8,22,17,37],winter:[11,21,14,14]},
  2030:{vernal:[2,20,13,51],summer:[5,21,7,31],autumnal:[8,22,23,27],winter:[11,21,20,9]},
};
const CITIES=[
  {id:'none',name:'None',lat:null,lon:null,tz:[0,0,0,0]},
  {id:'default',name:'Default',lat:35,lon:null,tz:[0,0,0,0]},
  {id:'chicago',name:'Chicago',lat:41.88,lon:-87.63,tz:[-5,-5,-5,-6]},
  {id:'london',name:'London',lat:51.51,lon:-0.13,tz:[0,1,1,0]},
  {id:'paris',name:'Paris',lat:48.86,lon:2.35,tz:[1,2,2,1]},
  {id:'montreal',name:'Montreal',lat:45.50,lon:-73.57,tz:[-4,-4,-4,-5]},
  {id:'fortyukon',name:'Fort Yukon',lat:66.57,lon:-145.27,tz:[-8,-8,-8,-9]},
  {id:'honolulu',name:'Honolulu',lat:21.31,lon:-157.86,tz:[-10,-10,-10,-10]},
  {id:'tokyo',name:'Tokyo',lat:35.68,lon:139.69,tz:[9,9,9,9]},
];
function fLon(l){if(l===null)return'';return Math.abs(l).toFixed(1)+(l<0?'°W':'°E');}
function locDate(yr,dk,c){const e=EU[yr][dk],o=c.tz[DI[dk]];const d=new Date(Date.UTC(yr,e[0],e[1],e[2],e[3]));d.setUTCMinutes(d.getUTCMinutes()+o*60);return MN[d.getUTCMonth()]+' '+d.getUTCDate();}

const VP={
  'W' :{az0:215,az1:325,dirs:[[225,'SW'],[247.5,'WSW'],[270,'W'],[292.5,'WNW'],[315,'NW']]},
  'NW':{az0:258,az1:368,dirs:[[270,'W'],[292.5,'WNW'],[315,'NW'],[337.5,'NNW'],[360,'N']]},
  'SW':{az0:168,az1:278,dirs:[[180,'S'],[202.5,'SSW'],[225,'SW'],[247.5,'WSW'],[270,'W']]},
};

// Solar math
function ovf(doy){return 1+2*0.0167086*Math.cos((doy-3)/365.25*2*Math.PI);}
function sAlt(lR,dR,hR){return Math.asin(Math.sin(lR)*Math.sin(dR)+Math.cos(lR)*Math.cos(dR)*Math.cos(hR));}
function sAz(lR,dR,hR){const a=sAlt(lR,dR,hR),ca=Math.cos(a);if(ca<1e-10)return Math.PI;let c2=(Math.sin(dR)-Math.sin(lR)*Math.sin(a))/(Math.cos(lR)*ca);c2=Math.max(-1,Math.min(1,c2));let az=Math.acos(c2);if(hR>0)az=2*Math.PI-az;return az;}
function haAt(lR,dR,aD){const c2=(Math.sin(aD*D)-Math.sin(lR)*Math.sin(dR))/(Math.cos(lR)*Math.cos(dR));return(c2<-1||c2>1)?null:Math.acos(c2);}
function mkPath(latD,decD){
  const lR=latD*D,dR=decD*D;
  let h6=haAt(lR,dR,6);if(!h6)h6=haAt(lR,dR,2);if(!h6)h6=haAt(lR,dR,0);if(!h6)return null;
  let hE=haAt(lR,dR,-20);if(!hE)hE=Math.PI;
  const p=[];for(let i=0;i<=500;i++){const ha=h6+(hE-h6)*i/500;p.push({ha,alt:sAlt(lR,dR,ha)*RD,az:sAz(lR,dR,ha)*RD});}return p;
}
function t2alt(latD,decD,aD,dk){const lR=latD*D,dR=decD*D;const h0=haAt(lR,dR,0),ht=haAt(lR,dR,aD);if(!h0||!ht)return null;return(ht-h0)*RD/(15/ovf(DOY[dk]))*60;}
function sunsetAzD(latD,decD){const lR=latD*D,dR=decD*D;const ha=haAt(lR,dR,0);return ha?sAz(lR,dR,ha)*RD:null;}
function pathAngle(latD,decD){const lR=latD*D,dR=decD*D;const ha1=haAt(lR,dR,1),ha3=haAt(lR,dR,3);if(!ha1||!ha3)return null;const az1=sAz(lR,dR,ha1)*RD,az3=sAz(lR,dR,ha3)*RD;return Math.atan2(Math.abs(az1-az3),2)*RD;}
// Does sun rise? (max altitude > 0)
function sunRises(latD,decD){return(90-Math.abs(latD-decD))>0;}

const STARS=[];for(let i=0;i<300;i++)STARS.push({x:Math.random(),y:Math.random()*.85,sz:Math.random()*1.4+.3,br:Math.random()*.6+.4,tw:Math.random()*Math.PI*2});
function genSil(w){const p=[];let x=0;while(x<=w){let r=Math.sin(x*.02)*4+Math.sin(x*.007)*6+Math.sin(x*.05)*2;let h=Math.max(2,r+8);if(Math.sin(x*.15+1)>.85)h+=12+Math.random()*10;else if(Math.sin(x*.08+3)>.7)h+=6+Math.random()*5;p.push({x,h});x+=3;}return p;}

function lerp(a,b,t){t=Math.max(0,Math.min(1,t));return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
function rgb(c){return`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;}
function skyCols(a){
  if(a>4)return{z:[70,130,200],m:[120,170,220],h:[255,200,100],g:[255,180,60]};
  if(a>0){const t=(4-a)/4;return{z:lerp([70,130,200],[30,50,110],t),m:lerp([120,170,220],[80,80,140],t),h:lerp([255,200,100],[255,100,40],t),g:lerp([255,180,60],[255,80,20],t)};}
  if(a>-6){const t=-a/6;return{z:lerp([30,50,110],[10,15,45],t),m:lerp([80,80,140],[20,25,60],t),h:lerp([255,100,40],[80,40,30],t),g:lerp([255,80,20],[100,40,20],t*.8)};}
  if(a>-12){const t=(-a-6)/6;return{z:lerp([10,15,45],[5,5,18],t),m:lerp([20,25,60],[8,8,25],t),h:lerp([80,40,30],[15,12,20],t),g:lerp([100,40,20],[20,10,15],t)};}
  if(a>-18){const t=(-a-12)/6;return{z:lerp([5,5,18],[2,2,8],t),m:lerp([8,8,25],[3,3,10],t),h:lerp([15,12,20],[3,3,8],t),g:lerp([20,10,15],[5,3,5],t)};}
  return{z:[2,2,6],m:[2,2,8],h:[3,3,8],g:[3,3,6]};
}

const skyC=document.getElementById('sky-canvas'),ctx=skyC.getContext('2d');
let W,H,HY,sil;
let AZ0=215,AZ1=325,AZR=110;
const AL0=12,ALR=32;
function pX(az){return(az-AZ0)/AZR*W;}
function pY(al){return(AL0-al)/ALR*H;}

function resize(){
  const wr=document.getElementById('canvas-wrap');
  W=wr.clientWidth;H=Math.max(360,Math.min(680,window.innerHeight-145));
  skyC.width=W;skyC.height=H;HY=pY(0);sil=genSil(W);
  positionAzCard();
  drawFrame(performance.now());
}

function positionAzCard(){
  // Position azimuth card so top is at -3° vertical and bottom at -19° vertical
  const card=document.getElementById('card-azimuth');
  const topY=pY(-3);
  const botY=pY(-19);
  const cardH=botY-topY;
  card.style.position='absolute';
  card.style.top=topY+'px';
  card.style.right='8px';
  card.style.width='235px';
  card.style.height=cardH+'px';
  card.style.overflow='hidden';
  // Resize the azimuth canvas to fit
  const azCanvas=document.getElementById('azimuth-canvas');
  const infoH=30; // approx space for az-info text
  const titleH=20; // approx space for h3
  const pad=18; // card padding
  const availH=cardH-titleH-infoH-pad;
  if(availH>60){azCanvas.height=availH;azCanvas.width=Math.round(availH*1.3);}
}

let abTime=0,abAngle=null,abPos=null,abDir=null,prevAV=99;
const PC={vernal:{d:'rgba(255,255,100,0.15)',b:'rgba(255,255,100,0.75)'},
  summer:{d:'rgba(255,100,100,0.15)',b:'rgba(255,100,100,0.75)'},
  autumnal:{d:'rgba(100,255,100,0.15)',b:'rgba(100,255,100,0.75)'},
  winter:{d:'rgba(100,150,255,0.15)',b:'rgba(100,150,255,0.75)'}};

function cpHitsBox(aP,dk){
  const p=aP[dk];if(!p)return false;
  const boxL=W-250,boxT=0,boxB=H;
  for(const pt of p){const x=pX(pt.az),y=pY(pt.alt);if(x>=boxL&&y>=0)return true;}
  return false;
}

function drawSky(sunAlt,sunAz,aP,sel,ts){
  ctx.clearRect(0,0,W,H);
  const c=skyCols(sunAlt);
  const g=ctx.createLinearGradient(0,0,0,HY);
  g.addColorStop(0,rgb(c.z));g.addColorStop(.5,rgb(c.m));g.addColorStop(.85,rgb(c.h));g.addColorStop(1,rgb(c.g));
  ctx.fillStyle=g;ctx.fillRect(0,0,W,HY);
  const sx=pX(sunAz);
  const gg=ctx.createRadialGradient(sx,HY,0,sx,HY,300);
  const ga=Math.max(0,Math.min(.5,(sunAlt+8)/14));
  gg.addColorStop(0,`rgba(${c.g[0]|0},${c.g[1]|0},${c.g[2]|0},${ga})`);gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;ctx.fillRect(0,0,W,HY+50);
  const sa=Math.max(0,Math.min(1,(-sunAlt-3)/12));
  if(sa>0)for(const s of STARS){const tw=.7+.3*Math.sin(ts*.002+s.tw);ctx.fillStyle=`rgba(220,220,255,${sa*s.br*tw})`;ctx.beginPath();ctx.arc(s.x*W,s.y*HY,s.sz,0,Math.PI*2);ctx.fill();}
  const bg=ctx.createLinearGradient(0,HY,0,H);const dk2=Math.max(0,Math.min(1,(-sunAlt+2)/20));
  bg.addColorStop(0,`rgba(8,18,12,${.7+dk2*.3})`);bg.addColorStop(1,'rgba(2,4,3,1)');
  ctx.fillStyle=bg;ctx.fillRect(0,HY,W,H-HY);
  if(sunAlt>-10){const bh=ctx.createRadialGradient(sx,HY,0,sx,HY+140,240);const ba=Math.max(0,(sunAlt+10)/16*.15);bh.addColorStop(0,`rgba(${c.g[0]|0},${c.g[1]|0},${c.g[2]|0},${ba})`);bh.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bh;ctx.fillRect(0,HY,W,H-HY);}

  // Ref lines
  const rl=[{a:0,l:'Horizon (0°)',c:'rgba(255,255,255,0.4)',d:[]},{a:-6,l:'Civil −6° Vertical',c:'rgba(255,107,53,0.5)',d:[8,4]},{a:-12,l:'Nautical −12° Vertical',c:'rgba(58,134,255,0.5)',d:[8,4]},{a:-18,l:'Astronomical −18° Vertical',c:'rgba(131,56,236,0.5)',d:[8,4]}];
  for(const r of rl){const y=pY(r.a);ctx.strokeStyle=r.c;ctx.lineWidth=1;ctx.setLineDash(r.d);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.setLineDash([]);ctx.font='11px Nunito, sans-serif';ctx.fillStyle=r.c;ctx.textAlign='left';ctx.fillText(r.l,10,y-4);}

  // Draw CPs
  const eqSel=sel==='vernal'||sel==='autumnal';
  function drawCP(p,color,lw,dash){
    if(!p||p.length<2)return;
    ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.setLineDash(dash);
    ctx.beginPath();let st=false;
    for(const pt of p){const x=pX(pt.az),y=pY(pt.alt);if(x<-60||x>W+60||y<-60||y>H+60)continue;if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);}
    ctx.stroke();ctx.setLineDash([]);
  }

  // Find a point near 3-4° altitude on a path for labeling "in the haze"
  function labelInHaze(p,name,color,bold){
    if(!p||p.length<2)return;
    for(const pt of p){
      if(pt.alt>2.5&&pt.alt<4.5){
        const lx=pX(pt.az),ly=pY(pt.alt);
        ctx.font=(bold?'bold ':'')+'10px Nunito, sans-serif';
        ctx.fillStyle=color;ctx.textAlign='right';
        ctx.fillText(name,lx-72,ly);
        return;
      }
    }
    // Fallback: label at first visible point
    for(const pt of p){
      const x=pX(pt.az),y=pY(pt.alt);
      if(x>20&&x<W-20&&y>20&&y<H-20){
        ctx.font=(bold?'bold ':'')+'10px Nunito, sans-serif';
        ctx.fillStyle=color;ctx.textAlign='right';
        ctx.fillText(name,x-72,y);
        return;
      }
    }
  }

  // Non-selected paths
  for(const k of['vernal','summer','autumnal','winter']){
    if(k===sel)continue;
    if(!eqSel&&(k==='vernal'||k==='autumnal'))continue;
    drawCP(aP[k],PC[k].d,1,[4,3]);
    if(k!=='vernal'&&k!=='autumnal')labelInHaze(aP[k],DL[k],PC[k].d,false);
  }
  // Merged equinox
  if(!eqSel){
    drawCP(aP['vernal'],'rgba(200,220,150,0.25)',1.5,[4,3]);
    labelInHaze(aP['vernal'],'Equinox','rgba(200,220,150,0.35)',false);
  }
  // Active path
  drawCP(aP[sel],PC[sel].b,2.5,[]);
  labelInHaze(aP[sel],DL[sel],PC[sel].b,true);

  // Sun BEFORE silhouette
  const sy=pY(sunAlt);
  if(sy>-20&&sy<H+20){
    const gs=sunAlt>-6?45:22,sga=Math.max(.05,Math.min(.6,(sunAlt+10)/16));
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,gs);
    sg.addColorStop(0,`rgba(255,220,100,${sga})`);sg.addColorStop(.3,`rgba(255,160,50,${sga*.5})`);sg.addColorStop(1,'rgba(255,100,20,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,gs,0,Math.PI*2);ctx.fill();
    const da=Math.max(.1,Math.min(1,(sunAlt+15)/21));
    ctx.fillStyle=sunAlt>0?`rgba(255,240,180,${da})`:sunAlt>-6?`rgba(255,180,80,${da})`:`rgba(255,120,50,${da})`;
    ctx.beginPath();ctx.arc(sx,sy,8,0,Math.PI*2);ctx.fill();
  }

  // Silhouette on top
  ctx.fillStyle='#000';ctx.beginPath();ctx.moveTo(0,HY+2);
  for(const s of sil)ctx.lineTo(s.x,HY-s.h+2);
  ctx.lineTo(W,HY+2);ctx.lineTo(W,HY+6);ctx.lineTo(0,HY+6);ctx.closePath();ctx.fill();

  // Angle bracket
  if(prevAV>0.1&&sunAlt<=0.1&&sunAlt>-0.5&&S.playing){
    abTime=performance.now();abAngle=pathAngle(S.lat,DECL[sel]);abPos={x:sx,y:HY};
    const lR=S.lat*D,dR=DECL[sel]*D;
    const ha_a=haAt(lR,dR,3),ha_b=haAt(lR,dR,0.5);
    if(ha_a&&ha_b){const ax=pX(sAz(lR,dR,ha_a)*RD),ay=pY(3),bx=pX(sAz(lR,dR,ha_b)*RD),by=pY(0.5);const dx=bx-ax,dy=by-ay,ln=Math.sqrt(dx*dx+dy*dy);abDir=ln>0?{x:dx/ln,y:dy/ln}:null;}else abDir=null;
  }
  if(abAngle!==null&&abPos!==null&&abDir!==null){
    const el=(ts-abTime)/1000;
    if(el<2.5){
      const al=el<2?1:Math.max(0,1-(el-2)/.5);
      const bx=abPos.x,by=abPos.y,arm=70;
      ctx.strokeStyle=`rgba(0,255,180,${al*.8})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by-arm);ctx.stroke();
      const ux=-abDir.x,uy=-abDir.y;
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+ux*arm,by+uy*arm);ctx.stroke();
      const vA=-Math.PI/2,cA=Math.atan2(uy,ux);
      ctx.strokeStyle=`rgba(0,255,180,${al*.6})`;ctx.lineWidth=1.5;
      let df=cA-vA;while(df>Math.PI)df-=2*Math.PI;while(df<-Math.PI)df+=2*Math.PI;
      if(df>0){ctx.beginPath();ctx.arc(bx,by,22,vA,vA+df);ctx.stroke();}
      else{ctx.beginPath();ctx.arc(bx,by,22,vA+df,vA);ctx.stroke();}
      ctx.font='bold 13px Orbitron, monospace';ctx.fillStyle=`rgba(0,255,180,${al})`;ctx.textAlign='left';
      ctx.fillText(abAngle.toFixed(1)+'°',bx+30,by-arm*.55);
    }else{abAngle=null;abPos=null;abDir=null;}
  }
  prevAV=sunAlt;

  // Compass
  const vp=VP[S.viewpoint];
  ctx.textAlign='center';
  const centerDir={'W':'W','NW':'NW','SW':'SW'}[S.viewpoint];
  for(const[az,lb]of vp.dirs){
    const x=pX(az);if(x<5||x>W-5)continue;
    const isC=lb===centerDir;
    ctx.font='11px Orbitron, monospace';
    ctx.fillStyle=isC?'rgba(255,255,255,0.65)':'rgba(255,255,255,0.3)';
    ctx.fillText(lb,x,HY+18);
    if(isC){ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;const tw=ctx.measureText(lb).width;ctx.beginPath();ctx.moveTo(x-tw/2,HY+20);ctx.lineTo(x+tw/2,HY+20);ctx.stroke();}
  }
}

// Azimuth diagram
const azC=document.getElementById('azimuth-canvas'),azX=azC.getContext('2d');
const DC2={vernal:'#ffff66',summer:'#ff6666',autumnal:'#66ff66',winter:'#6699ff'};

function drawAzDiag(latD,sel){
  // Force full canvas clear by resetting dimensions
  const savedW=azC.width,savedH=azC.height;
  azC.width=savedW; // this resets the canvas state completely
  azX.clearRect(0,0,azC.width,azC.height);
  const cw=azC.width,ch=azC.height,cx=cw/2,cy=ch-14,Rd=58;
  azX.strokeStyle='rgba(255,255,255,0.2)';azX.lineWidth=1;
  azX.beginPath();azX.arc(cx,cy,Rd,Math.PI,0,false);azX.stroke();
  azX.font='9px Orbitron, monospace';azX.fillStyle='rgba(255,255,255,0.35)';azX.textAlign='center';
  azX.fillText('S',cx-Rd-10,cy+4);azX.fillText('N',cx+Rd+10,cy+4);

  const res={};
  const noRise={};
  for(const dk of['winter','vernal','summer','autumnal']){
    if(!sunRises(latD,DECL[dk])){
      // Sun doesn't rise — special case
      noRise[dk]=true;
      // Show indicator at 90° from W = due S
      const cA=Math.PI; // due S on semicircle
      const ll=Rd-4;
      const ex=cx+ll*Math.cos(cA),ey=cy-ll*Math.sin(cA);
      const isAct=dk===sel;
      azX.strokeStyle=isAct?DC2[dk]:DC2[dk]+'55';azX.lineWidth=isAct?2:1;azX.setLineDash([3,2]);
      azX.beginPath();azX.moveTo(cx,cy);azX.lineTo(ex,ey);azX.stroke();azX.setLineDash([]);
      azX.font='8px Nunito, sans-serif';azX.fillStyle=isAct?DC2[dk]:DC2[dk]+'88';azX.textAlign='center';
      azX.fillText(DSH[dk],ex-12,ey-2);
      res[dk]={az:180,off:-90,noRise:true};
      continue;
    }
    const az=sunsetAzD(latD,DECL[dk]);if(az===null)continue;
    const off=az-270;res[dk]={az,off};
    const cA=Math.PI/2-off*D;
    const eqSel2=sel==='vernal'||sel==='autumnal';
    const isEq=dk==='vernal'||dk==='autumnal';
    const isAct=dk===sel;const noEq=!eqSel2;
    if(isEq&&noEq&&dk==='autumnal')continue;
    const ll=isAct?Rd+8:Rd-4;
    const ex=cx+ll*Math.cos(cA),ey=cy-ll*Math.sin(cA);
    let lc,lw,ld;
    if(isAct){lc=DC2[dk];lw=2.5;ld=[];}
    else if(isEq&&noEq){lc='rgba(200,220,150,0.35)';lw=1.5;ld=[3,2];}
    else{lc=DC2[dk]+'55';lw=1.5;ld=[3,2];}
    azX.strokeStyle=lc;azX.lineWidth=lw;azX.setLineDash(ld);
    azX.beginPath();azX.moveTo(cx,cy);azX.lineTo(ex,ey);azX.stroke();azX.setLineDash([]);
    const tx=cx+(ll+12)*Math.cos(cA),ty=cy-(ll+12)*Math.sin(cA);
    azX.textAlign='center';
    // Clean labels: W when neither equinox selected, just AE or VE when selected
    if(isEq&&noEq){
      // Neither equinox selected — show W only
      azX.fillStyle='rgba(255,255,255,0.5)';azX.font='9px Orbitron, monospace';azX.fillText('W',tx,ty+2);
    }else if(isAct&&isEq){
      // This equinox selected — show just its name (AE or VE)
      azX.font='bold 9px Nunito, sans-serif';azX.fillStyle=DC2[dk];azX.fillText(DSH[dk],tx,ty+2);
    }else if(isEq&&!noEq&&!isAct){
      // Other equinox not selected — show nothing (no dim label)
    }else if(!isEq){
      azX.font=isAct?'bold 9px Nunito, sans-serif':'8px Nunito, sans-serif';azX.fillStyle=isAct?DC2[dk]:DC2[dk]+'88';azX.fillText(DSH[dk],tx,ty);
    }
  }
  azX.fillStyle='#fff';azX.beginPath();azX.arc(cx,cy,3,0,Math.PI*2);azX.fill();

  const inf=document.getElementById('az-info'),sr=res[sel];
  if(sr){
    if(sr.noRise){
      inf.innerHTML=`<b>${DL[sel]}</b><br>Sun does not rise.<br>Sunset angle ≈ 90° from W`;
    }else{
      const sign=sr.off>=0?'+':'−';const dir=sr.off>0.5?'N of W':sr.off<-0.5?'S of W':'≈ due W';
      inf.innerHTML=`<b>${DL[sel]}</b><br>Azimuth: ${sr.az.toFixed(1)}° (${sign}${Math.abs(sr.off).toFixed(1)}° ${dir})`;
    }
  }else inf.innerHTML=`<b>${DL[sel]}</b><br>Sun does not set.`;
}

// State
const S={year:2026,day:'vernal',lat:35,speed:480,playing:false,currentHA:0,haStart:0,haEnd:0,haSunset:null,haPhases:{},allPaths:{},segDur:{},lastFT:0,finished:false,city:CITIES[1]/*default*/,maxElapsed:null,viewpoint:'W',azBlankNeeded:false};

function fmtT(m){if(m===null||isNaN(m))return'──:──';const mm=Math.floor(m),ss=Math.round((m-mm)*60);return`${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}

function applyVP(){const vp=VP[S.viewpoint];AZ0=vp.az0;AZ1=vp.az1;AZR=AZ1-AZ0;HY=pY(0);sil=genSil(W);}

function recalc(){
  const{lat,day}=S,dec=DECL[day],lR=lat*D,dR=dec*D;
  applyVP();
  S.haStart=haAt(lR,dR,6)||haAt(lR,dR,2)||haAt(lR,dR,0)||0;
  S.haSunset=haAt(lR,dR,0);
  let he=haAt(lR,dR,-20);S.haEnd=he||Math.PI;
  S.haPhases={civil:haAt(lR,dR,-6),nautical:haAt(lR,dR,-12),astro:haAt(lR,dR,-18)};
  S.allPaths={};for(const dk of['vernal','summer','autumnal','winter'])S.allPaths[dk]=mkPath(lat,DECL[dk]);
  const ct=t2alt(lat,dec,-6,day),nt=t2alt(lat,dec,-12,day),at2=t2alt(lat,dec,-18,day);
  S.segDur={civil:ct,nautical:nt!==null&&ct!==null?nt-ct:null,astro:at2!==null&&nt!==null?at2-nt:null,total:at2};
  S.maxElapsed=null; // no artificial cap
  // For no-sunset cases, set haEnd to 45° HA beyond haStart
  if(S.haSunset===null){
    S.haEnd=S.haStart+45*D;
  }
  // Update timer title
  document.getElementById('timer-title').textContent=S.haSunset?'Elapsed Time Since Sunset':'Elapsed Time';
  // Check if CP hits azimuth box for this day
  S.azBlankNeeded=cpHitsBox(S.allPaths,day);

  S.currentHA=S.haStart;S.finished=false;S.playing=false;prevAV=99;abAngle=null;abPos=null;abDir=null;
  document.getElementById('btn-play').textContent='▶ Play';
  positionAzCard();
  updTimers(0);drawAzDiag(lat,day);updInfoBox();
  // Show azimuth at full opacity until Play (don't blank yet)
  document.getElementById('card-azimuth').style.opacity='1';
  document.getElementById('card-timer').style.opacity='1';
  drawFrame(performance.now());
}

function updAzOp(){
  // Only blank during play or when finished, and only if CP hits box for selected day
  if(!S.playing&&!S.finished){document.getElementById('card-azimuth').style.opacity='1';return;}
  document.getElementById('card-azimuth').style.opacity=S.azBlankNeeded?'0.25':'1';
}
function updTimerOp(sunAz,sunAlt){
  // Dim timer if sun passes behind it (high lat, sun doesn't set)
  const sx=pX(sunAz),sy=pY(sunAlt);
  const overlaps=sx>W-260&&sy<200&&(S.playing||S.finished);
  document.getElementById('card-timer').style.opacity=overlaps?'0.25':'1';
}

function updInfoBox(){
  const c=S.city,ld=locDate(S.year,S.day,c);
  let t=`<b>${DL[S.day]}</b>\n${ld}, ${S.year} · ${S.lat.toFixed(0)}°N`;
  if(c.id!=='none'&&c.id!=='default'&&c.lon!==null)t+=`\n${c.name} (${fLon(c.lon)})`;
  else if(c.id==='default')t+='\nDefault · GMT/UTC';
  else t+='\nGMT/UTC';
  let dl='';for(const dk of['vernal','summer','autumnal','winter']){const d=locDate(S.year,dk,c);dl+=`${dk===S.day?'▸':'·'}${DSH[dk]}:${d} `;}
  document.getElementById('info-box').innerHTML=t+'\n'+dl;
}

function curAlt(){return sAlt(S.lat*D,DECL[S.day]*D,S.currentHA)*RD;}
function curAz(){return sAz(S.lat*D,DECL[S.day]*D,S.currentHA)*RD;}

function updTimers(eM){
  let dE=eM;
  document.getElementById('elapsed-clock').textContent=(S.haSunset&&S.currentHA>=S.haSunset)?fmtT(dE):(S.haSunset===null&&(S.playing||S.finished))?fmtT(dE):'00:00';
  const{segDur:sd,haPhases:hp}=S;
  const up=(id,ph,v)=>{const e=document.getElementById(id);if(hp[ph]!==null&&S.currentHA>=hp[ph]){e.textContent=fmtT(v);e.classList.add('filled');}else{e.textContent=hp[ph]===null?'N/A':'──:──';e.classList.remove('filled');}};
  up('t-civil','civil',sd.civil);up('t-nautical','nautical',sd.nautical);up('t-astro','astro',sd.astro);
  const tt=document.getElementById('t-total');
  if(hp.astro!==null&&S.currentHA>=hp.astro)tt.textContent=fmtT(sd.total);else tt.textContent=hp.astro===null?'N/A':'──:──';
  const al=curAlt(),pe=document.getElementById('phase-label');
  if(al>0){pe.textContent='DAYLIGHT';pe.style.color='#ffdd44';}
  else if(al>-6){pe.textContent='CIVIL TWILIGHT';pe.style.color='#ff6b35';}
  else if(al>-12){pe.textContent='NAUTICAL TWILIGHT';pe.style.color='#3a86ff';}
  else if(al>-18){pe.textContent='ASTRONOMICAL TWILIGHT';pe.style.color='#8338ec';}
  else{pe.textContent='NIGHT';pe.style.color='#444466';}
  document.getElementById('alt-label').textContent=`${al>=0?'+':''}${al.toFixed(1)}°`;
}

function drawFrame(ts){
  const alt=curAlt(),az=curAz();
  drawSky(alt,az,S.allPaths,S.day,ts);
  let eM=0;
  if(S.haSunset&&S.currentHA>=S.haSunset){eM=(S.currentHA-S.haSunset)*RD/(15/ovf(DOY[S.day]))*60;}
  else if(S.haSunset===null&&(S.playing||S.finished)){
    // Sun doesn't set — elapsed from start of play
    eM=(S.currentHA-S.haStart)*RD/(15/ovf(DOY[S.day]))*60;
  }
  updTimers(eM);updTimerOp(az,alt);updAzOp();
}

function animate(ts){
  if(!S.playing)return;
  if(S.lastFT===0)S.lastFT=ts;const dt=(ts-S.lastFT)/1000;S.lastFT=ts;
  S.currentHA+=S.speed*dt/3600*15*D;
  let eM=0;
  if(S.haSunset&&S.currentHA>=S.haSunset){eM=(S.currentHA-S.haSunset)*RD/(15/ovf(DOY[S.day]))*60;}
  else if(S.haSunset===null){eM=(S.currentHA-S.haStart)*RD/(15/ovf(DOY[S.day]))*60;}
  // Check current azimuth for due-N stop in no-sunset cases
  const curAzNow=sAz(S.lat*D,DECL[S.day]*D,S.currentHA)*RD;
  let stop=false;
  if(S.currentHA>=S.haEnd)stop=true;
  // At high latitudes with no sunset, stop when sun reaches due N (az≈360/0)
  // Detect: azimuth was >350 and now wraps to <10, or azimuth reaches >=359
  if(S.haSunset===null&&curAzNow>=358)stop=true;
  if(S.haSunset===null&&curAzNow<90&&S.currentHA>S.haStart+5*D)stop=true; // wrapped past N
  if(stop){if(S.currentHA>S.haEnd)S.currentHA=S.haEnd;S.playing=false;S.finished=true;document.getElementById('btn-play').textContent='▶ Play';}
  drawFrame(ts);if(S.playing)requestAnimationFrame(animate);
}

function resetToDefault(){
  S.city=CITIES[1];// Default
  S.lat=35;
  document.getElementById('sl-lat').value=35;
  document.getElementById('lat-display').textContent='35°N';
  document.getElementById('loc-sel').value='default';
  S.viewpoint='W';document.getElementById('vp-sel').value='W';
}

// Controls
const ySel=document.getElementById('sel-year');
for(let y=2026;y<=2030;y++){const o=document.createElement('option');o.value=y;o.textContent=y;ySel.appendChild(o);}
ySel.value='2026';
const dSel=document.getElementById('sel-day');dSel.value='vernal';
const lSel=document.getElementById('loc-sel');
for(const c of CITIES){const o=document.createElement('option');o.value=c.id;
  if(c.id==='none')o.textContent='None';
  else if(c.id==='default')o.textContent=`Default (${c.lat}°N)`;
  else o.textContent=`${c.name} (${c.lat.toFixed(0)}°N)`;
  lSel.appendChild(o);}
lSel.value='default';
const lSl=document.getElementById('sl-lat'),lDis=document.getElementById('lat-display');

// Year/Day change → just recalc, preserve current location/lat/viewpoint
ySel.addEventListener('change',()=>{S.year=+ySel.value;recalc();});
dSel.addEventListener('change',()=>{S.day=dSel.value;recalc();});

// Latitude slider → set location to None, no viewpoint change
lSl.addEventListener('input',()=>{S.lat=+lSl.value;lDis.textContent=S.lat+'°N';S.city=CITIES[0];lSel.value='none';recalc();});

// Location change
lSel.addEventListener('change',()=>{
  const c=CITIES.find(x=>x.id===lSel.value);
  if(!c)return;
  if(c.id==='none'){
    // None selected — don't change lat, just clear city
    S.city=c;recalc();return;
  }
  S.city=c;
  if(c.lat!==null){S.lat=Math.round(c.lat);lSl.value=S.lat;lDis.textContent=S.lat+'°N';}
  S.day='vernal';dSel.value='vernal';
  S.viewpoint='W';document.getElementById('vp-sel').value='W';
  recalc();
});

// Viewpoint → NO autoselect change
document.getElementById('vp-sel').addEventListener('change',e=>{S.viewpoint=e.target.value;applyVP();
  // Redraw without recalc to avoid resetting state
  S.allPaths={};for(const dk of['vernal','summer','autumnal','winter'])S.allPaths[dk]=mkPath(S.lat,DECL[dk]);
  S.azBlankNeeded=cpHitsBox(S.allPaths,S.day);
  positionAzCard();drawAzDiag(S.lat,S.day);updInfoBox();drawFrame(performance.now());
});

document.getElementById('sel-speed').addEventListener('change',e=>{S.speed=+e.target.value;});

document.getElementById('btn-play').addEventListener('click',()=>{
  if(S.finished){S.currentHA=S.haStart;S.finished=false;prevAV=99;abAngle=null;abDir=null;}
  S.playing=!S.playing;document.getElementById('btn-play').textContent=S.playing?'❚❚ Pause':'▶ Play';
  if(S.playing){S.lastFT=0;requestAnimationFrame(animate);}
});
document.getElementById('btn-restart').addEventListener('click',()=>{
  S.currentHA=S.haStart;S.finished=false;S.playing=false;prevAV=99;abAngle=null;abPos=null;abDir=null;
  document.getElementById('btn-play').textContent='▶ Play';
  document.getElementById('card-azimuth').style.opacity='1';
  document.getElementById('card-timer').style.opacity='1';
  recalc();
});

// Fullscreen toggle
document.getElementById('btn-fs').addEventListener('click',()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

window.addEventListener('resize',resize);
resize();recalc();
</script>
